<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Facturas con IA ⚡</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #080c14;
      --surface: #0e1520;
      --border:  #1c2a3e;
      --accent:  #3b82f6;
      --accent2: #6366f1;
      --text:    #e2e8f0;
      --muted:   #4a607a;
      --success: #10b981;
      --warning: #f59e0b;
      --danger:  #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(59,130,246,.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 90% 80%, rgba(99,102,241,.07) 0%, transparent 60%);
    }

    /* ── HEADER ── */
    header {
      padding: 2rem 2rem 1.5rem;
      display: flex; flex-wrap: wrap;
      align-items: center; justify-content: space-between;
      gap: 1rem; border-bottom: 1px solid var(--border);
    }
    .logo-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800; letter-spacing: -.02em;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-sub {
      font-family: 'DM Mono', monospace; font-size: .7rem;
      color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-top:.25rem;
    }

    /* refresh badge */
    .refresh-badge {
      display: flex; align-items: center; gap: .6rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 9999px; padding: .45rem 1rem;
      font-family: 'DM Mono', monospace; font-size: .78rem; color: var(--muted);
      transition: border-color .3s;
    }
    .refresh-badge.loading { border-color: var(--accent); color: var(--accent); }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite; display: none;
    }
    .refresh-badge.loading .spinner { display: block; }
    .refresh-badge.loading .countdown-wrap { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem; padding: 1.5rem 2rem;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem 1.5rem;
      position: relative; overflow: hidden;
      transition: border-color .2s, transform .2s;
    }
    .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .stat-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(59,130,246,.06), transparent);
      pointer-events: none;
    }
    .stat-label {
      font-family: 'DM Mono', monospace; font-size: .65rem;
      letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem;
    }
    .stat-value { font-size: 1.55rem; font-weight: 700; letter-spacing: -.02em; color: #fff; }
    .stat-icon { position: absolute; right: 1.2rem; top: 50%; transform: translateY(-50%); font-size: 1.8rem; opacity: .12; }

    /* ── TABLE ── */
    .table-wrap { padding: 0 2rem 2rem; }
    .table-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem; flex-wrap: wrap; gap: .5rem;
    }
    .table-title { font-size: .75rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .pill-count {
      background: rgba(59,130,246,.15); color: var(--accent);
      border-radius: 9999px; padding: .2rem .75rem;
      font-family: 'DM Mono', monospace; font-size: .72rem;
    }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: .84rem; }
    thead th {
      background: var(--surface); color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: .66rem;
      letter-spacing: .08em; text-transform: uppercase;
      padding: .85rem 1rem; text-align: left; white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid rgba(28,42,62,.6); transition: background .15s; }
    tbody tr:hover { background: rgba(59,130,246,.04); }
    tbody td { padding: .8rem 1rem; vertical-align: middle; white-space: nowrap; }
    tbody td.wrap { white-space: normal; min-width: 130px; }

    /* newest row */
    tr.newest td { background: rgba(59,130,246,.07); }
    tr.newest td:first-child { border-left: 3px solid var(--accent); }
    .badge-new {
      display: inline-block; background: var(--accent); color: #fff;
      font-family: 'DM Mono', monospace; font-size: .58rem;
      border-radius: 4px; padding: .1rem .4rem; margin-left: .4rem;
      animation: pulse-badge 1.5s ease infinite;
    }
    @keyframes pulse-badge { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* pills */
    .cat {
      display: inline-block; background: rgba(99,102,241,.15); color: #a5b4fc;
      border-radius: 6px; padding: .15rem .55rem; font-size: .73rem; font-weight: 600;
    }
    .estado-pendiente {
      display: inline-flex; align-items: center; gap: .3rem;
      background: rgba(245,158,11,.12); color: var(--warning);
      border-radius: 6px; padding: .15rem .6rem; font-size: .73rem; font-weight: 600;
    }
    .estado-pagado {
      display: inline-flex; align-items: center; gap: .3rem;
      background: rgba(16,185,129,.12); color: var(--success);
      border-radius: 6px; padding: .15rem .6rem; font-size: .73rem; font-weight: 600;
    }
    .mono { font-family: 'DM Mono', monospace; }
    .amount { font-family: 'DM Mono', monospace; color: var(--success); }
    .total-val { font-family: 'DM Mono', monospace; color: #fff; font-weight: 600; }
    .iva-val { font-family: 'DM Mono', monospace; color: var(--warning); }

    /* ── EMPTY ── */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 1.5rem; padding: 5rem 2rem; text-align: center;
    }
    .empty-icon {
      width: 72px; height: 72px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 2rem; animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .empty h2 { font-size: 1.1rem; font-weight: 700; }
    .empty p  { font-size: .85rem; color: var(--muted); max-width: 300px; line-height: 1.6; }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 2rem; border-top: 1px solid var(--border);
      font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted); letter-spacing: .05em;
    }
    footer span { color: var(--accent); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: 10px; padding: .75rem 1.25rem;
      font-size: .82rem; color: var(--accent);
      display: flex; align-items: center; gap: .6rem;
      transform: translateY(100px); opacity: 0;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
      z-index: 99; pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 600px) {
      header, .stats, .table-wrap { padding-left: 1rem; padding-right: 1rem; }
      .stat-value { font-size: 1.25rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo-title">Sistema de Facturas con IA ⚡</div>
    <div class="logo-sub">Ferretería Quequén · Automatización inteligente de comprobantes</div>
  </div>
  <div class="refresh-badge" id="badge">
    <div class="spinner"></div>
    <div class="countdown-wrap" style="display:flex;align-items:center;gap:.5rem">
      <svg width="16" height="16" viewBox="0 0 16 16">
        <circle cx="8" cy="8" r="6" fill="none" stroke="#1c2a3e" stroke-width="2"/>
        <circle cx="8" cy="8" r="6" fill="none" stroke="#3b82f6" stroke-width="2"
          stroke-dasharray="37.7" stroke-dashoffset="0" id="ring"
          style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset .9s linear"/>
      </svg>
      <span id="countdown">30s</span>
    </div>
  </div>
</header>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">Total facturas</div>
    <div class="stat-value" id="stat-count">—</div>
    <div class="stat-icon">📄</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Monto total</div>
    <div class="stat-value" id="stat-total">—</div>
    <div class="stat-icon">💰</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Pendientes de pago</div>
    <div class="stat-value" id="stat-pending">—</div>
    <div class="stat-icon">⏳</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Última factura</div>
    <div class="stat-value" id="stat-last" style="font-size:1.1rem">—</div>
    <div class="stat-icon">🕐</div>
  </div>
</div>

<div class="table-wrap">
  <div class="table-header">
    <div class="table-title">Comprobantes procesados</div>
    <div class="pill-count" id="pill">0 registros</div>
  </div>
  <div id="content"></div>
</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center">
  <div style="background:#0e1520;border:1px solid #1c2a3e;border-radius:16px;padding:2rem;max-width:480px;width:90%;position:relative">
    <button onclick="document.getElementById('modal').style.display='none'" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#4a607a;font-size:1.2rem;cursor:pointer">✕</button>
    <div style="font-family:'Syne',sans-serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:#4a607a;margin-bottom:1rem">Detalle de factura</div>
    <div id="modal-body"></div>
    <button onclick="copyAll()" style="margin-top:1.5rem;width:100%;padding:.75rem;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer">📋 Copiar todo</button>
  </div>
</div>

<footer>Powered by <span>Lambda Automations</span> · IA + n8n</footer>
<div id="toast">✨ Nueva factura detectada</div>

<script>
  const SUPA_URL  = 'https://vlaaukgviimswlmtcehu.supabase.co';
  const SUPA_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsYWF1a2d2aWltc3dsbXRjZWh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwOTQxMDYsImV4cCI6MjA5MjY3MDEwNn0.NDuNODIFTCx-DGznbr97XOD-NPPVWn5N8fUEu5N4VFU';
  const INTERVAL = 30;

  let countdown = INTERVAL;
  let lastCount = 0;

  function fmt(n) {
    const v = parseFloat((n||'0').replace(',','.'));
    return isNaN(v) ? n : v.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
  }

  function estadoPill(e) {
    if ((e||'').toLowerCase().includes('pag')) return `<span class="estado-pagado">✓ Pagado</span>`;
    return `<span class="estado-pendiente">● Pendiente</span>`;
  }

  function render(data) {
    if (!data || data.length === 0) {
      document.getElementById('content').innerHTML = `
        <div class="empty">
          <div class="empty-icon">📱</div>
          <h2>Esperando facturas...</h2>
          <p>Enviá una foto al bot de Telegram y los datos aparecen acá automáticamente en segundos.</p>
        </div>`;
      ['stat-count','stat-total','stat-pending','stat-last'].forEach(id=>document.getElementById(id).textContent='—');
      document.getElementById('pill').textContent='0 registros';
      lastCount=0; return;
    }

    const count = data.length;
    let totalSum=0, pendientes=0;
    data.forEach(r=>{
      const v = parseFloat((r.total||'0').replace(',','.'));
      if(!isNaN(v)) totalSum+=v;
      if(!(r.estado_pago||'').toLowerCase().includes('pag')) pendientes++;
    });

    document.getElementById('stat-count').textContent   = count;
    document.getElementById('stat-total').textContent   = totalSum>0 ? fmt(totalSum.toString()) : '—';
    document.getElementById('stat-pending').textContent = pendientes;
    document.getElementById('stat-last').textContent    = data[count-1]?.fecha || '—';
    document.getElementById('pill').textContent         = `${count} registro${count!==1?'s':''}`;

    if (lastCount>0 && count>lastCount) showToast();
    lastCount=count;

    const tbody = data.map((r,i) => {
      const isNew = i===count-1;
      return `<tr class="${isNew?'newest':''}" style="cursor:pointer" onclick="showDetail(${JSON.stringify(r).replace(/'/g,'&#39;')})">
        <td><span class="mono" style="font-size:.8rem">${r.fecha||'—'}</span></td>
        <td style="font-weight:600">${r.proveedor||'—'}${isNew?'<span class="badge-new">NUEVA</span>':''}</td>
        <td><span class="mono" style="color:#94a3b8;font-size:.78rem">${r.cuit||'—'}</span></td>
        <td class="amount">$ ${fmt(r.importe_neto)}</td>
        <td class="iva-val">$ ${fmt(r.iva)}</td>
        <td class="total-val">$ ${fmt(r.total)}</td>
        <td><span class="cat">${r.categoria||'—'}</span></td>
        <td>${estadoPill(r.estado_pago)}</td>
      </tr>`;
    }).join('');

    document.getElementById('content').innerHTML = `
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th>Fecha</th><th>Proveedor</th><th>CUIT</th>
            <th>Importe Neto</th><th>IVA</th><th>Total</th>
            <th>Categoría</th><th>Estado</th>
          </tr></thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>`;
  }

  async function fetchData() {
    const badge = document.getElementById('badge');
    badge.classList.add('loading');
    try {
      const res = await fetch(`${SUPA_URL}/rest/v1/facturas?select=*&order=created_at.asc`, {
        headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
      });
      const data = await res.json();
      render(Array.isArray(data) ? data : []);
    } catch(e) { console.error(e); }
    finally { badge.classList.remove('loading'); countdown=INTERVAL; }
  }

  function showToast() {
    const t=document.getElementById('toast');
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3500);
  }

  setInterval(()=>{
    countdown--;
    if(countdown<=0){ fetchData(); countdown=INTERVAL; }
    document.getElementById('countdown').textContent=countdown+'s';
    const offset=37.7*(1-countdown/INTERVAL);
    document.getElementById('ring').style.strokeDashoffset=offset;
  },1000);

  fetchData();

  const FIELDS = [
    ['Fecha','fecha'],['Proveedor','proveedor'],['CUIT','cuit'],
    ['Importe Neto','importe_neto'],['IVA','iva'],['Total','total'],
    ['Categoría','categoria'],['Estado Pago','estado_pago']
  ];
  let currentRow = {};

  window.showDetail = function(r) {
    currentRow = typeof r === 'string' ? JSON.parse(r) : r;
    const body = document.getElementById('modal-body');
    body.innerHTML = FIELDS.map(([label,key]) => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:.6rem 0;border-bottom:1px solid #1c2a3e">
        <span style="font-family:'DM Mono',monospace;font-size:.72rem;color:#4a607a;text-transform:uppercase;letter-spacing:.05em">${label}</span>
        <span style="font-family:'DM Mono',monospace;font-size:.85rem;color:#e2e8f0;font-weight:500">${currentRow[key]||'—'}</span>
      </div>`).join('');
    document.getElementById('modal').style.display='flex';
  };

  window.copyAll = function() {
    const text = FIELDS.map(([l,k])=>`${l}: ${currentRow[k]||'—'}`).join('\n');
    navigator.clipboard.writeText(text).then(()=>{
      const btn = document.querySelector('#modal button:last-child');
      btn.textContent='✅ Copiado!';
      setTimeout(()=>btn.textContent='📋 Copiar todo',2000);
    });
  };
</script>
</body>
</html>
